name: Build plugin

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon

      - name: Collect plugin artifact
        shell: bash
        run: |
          mkdir -p dist
          mapfile -t jars < <(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" | sort)
          if [ "${#jars[@]}" -ne 1 ]; then
            echo "Expected exactly one plugin jar in build/libs, found ${#jars[@]}" >&2
            printf "%s\n" "${jars[@]}" >&2
            exit 1
          fi
          cp "${jars[0]}" dist/
          sha256sum dist/*.jar > dist/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TreeCapitator-plugin
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
